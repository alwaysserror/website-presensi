{% extends "base.html" %}

{% block title %}Reset Password {{ role_label(role) }} - Presensi Face{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-panel">
        <p class="eyebrow">{{ role_label(role) }}</p>
        <h1>Reset password</h1>
        <form method="post" class="form-grid">
            <label>
                Password baru
                <input type="password" name="password" autocomplete="new-password" minlength="6" required>
            </label>
            <label>
                Konfirmasi password
                <input type="password" name="confirm_password" autocomplete="new-password" minlength="6" required>
            </label>
            <button class="button button-primary" type="submit">Simpan password</button>
        </form>
    </div>
</section>
{% endblock %}
