{% extends "base.html" %}

{% block title %}Lupa Password {{ role_label(role) }} - Presensi Face{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-panel">
        <p class="eyebrow">{{ role_label(role) }}</p>
        <h1>Lupa password</h1>
        <form method="post" class="form-grid">
            <label>
                Email
                <input type="email" name="email" autocomplete="email" required>
            </label>
            <button class="button button-primary" type="submit">Buat tautan reset</button>
        </form>
        {% if reset_link %}
            <div class="reset-box">
                <span>Link reset lokal</span>
                <a href="{{ reset_link }}">{{ reset_link }}</a>
            </div>
        {% endif %}
        <div class="auth-links">
            <a href="{{ url_for('login', role=role) }}">Kembali login</a>
        </div>
    </div>
</section>
{% endblock %}
